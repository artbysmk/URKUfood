<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="La Carta, app de pedidos y seguimiento de restaurantes.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="La Carta">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>La Carta</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      /* overlay light + repeating pattern from assets */
      background: linear-gradient(rgba(250,244,236,0.08), rgba(242,231,216,0.08)), url('assets/images/backgroundapp.png');
      background-repeat: repeat;
      background-size: 220px;
    }
    /* Force Flutter root elements to be transparent so body background shows through */
    body > * {
      background-color: transparent !important;
      background: transparent !important;
    }
  </style>
</head>

  <script src="flutter_bootstrap.js" async></script>
