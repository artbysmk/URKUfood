name: Keep Render Alive

on:
  schedule:
    # every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      RENDER_URL: ${{ secrets.RENDER_URL }}
    steps:
      - name: Ping Render URL
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_URL secret is not set. Failing the job.";
            exit 1;
          fi
          echo "Pinging $RENDER_URL";
          status=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_URL" || true);
          echo "HTTP status: $status";
          if [ "$status" = "" ] || [ "$status" -ge 400 ]; then
            echo "Ping returned non-2xx status";
          fi
        shell: bash
